# ═══════════════════════════════════════════════════════════════
#  Ignite Movies — High-Performance Nginx Streaming Config
#
#  Features:
#    - RTMP ingest + HLS/DASH output
#    - Proxy cache for video segments (RAM + disk)
#    - Load balancing across multiple streaming API servers
#    - Gzip for manifests; no compression for binary segments
#    - SSL/TLS with HTTP/2
#    - Rate limiting for stream endpoints
#    - CORS for video player clients
#    - Security headers
#
#  Install:
#    sudo apt install nginx libnginx-mod-rtmp
#    sudo cp nginx-rtmp.conf /etc/nginx/nginx.conf
#    sudo nginx -t && sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════════

worker_processes auto;
worker_rlimit_nofile 65536;
pid /run/nginx.pid;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
}

# ── RTMP (live ingest) ─────────────────────────────────────────
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        max_connections 1000;

        application live {
            live on;
            record off;
            allow publish 127.0.0.1;
            allow publish 10.0.0.0/8;
            deny  publish all;
            allow play all;

            hls on;
            hls_path /var/www/streams/hls/live;
            hls_fragment 6s;
            hls_playlist_length 60s;
            hls_nested on;
            hls_variants _360p  BANDWIDTH=928000  RESOLUTION=640x360;
            hls_variants _480p  BANDWIDTH=1528000 RESOLUTION=854x480;
            hls_variants _720p  BANDWIDTH=2992000 RESOLUTION=1280x720;
            hls_variants _1080p BANDWIDTH=5320000 RESOLUTION=1920x1080;

            dash on;
            dash_path /var/www/streams/dash/live;
            dash_fragment 6s;
            dash_playlist_length 60s;
            dash_nested on;
        }

        application vod {
            play /var/www/streams/vod;
        }
    }
}

# ── HTTP ────────────────────────────────────────────────────────
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    server_tokens      off;

    # Buffer tuning
    client_body_buffer_size     128k;
    client_max_body_size        500m;
    proxy_buffer_size           16k;
    proxy_buffers               8 16k;
    proxy_busy_buffers_size     64k;

    # ── PROXY CACHE ZONES ──────────────────────────────────────
    # Stores HLS/DASH segments in RAM + disk for fast delivery
    proxy_cache_path /var/cache/nginx/segments
        levels=1:2
        keys_zone=segments:64m     # 64 MB key store in RAM
        max_size=20g               # 20 GB disk cache for segments
        inactive=10m               # evict after 10 min unused
        use_temp_path=off;

    proxy_cache_path /var/cache/nginx/playlists
        levels=1:2
        keys_zone=playlists:10m
        max_size=500m
        inactive=30s
        use_temp_path=off;

    # ── LOAD BALANCING — Streaming API servers ─────────────────
    upstream api_backend {
        least_conn;
        keepalive 32;

        server 127.0.0.1:3001 weight=1 max_fails=3 fail_timeout=30s;
        # Add more servers for horizontal scaling:
        # server 10.0.0.2:3001 weight=1 max_fails=3 fail_timeout=30s;
        # server 10.0.0.3:3001 weight=1 max_fails=3 fail_timeout=30s;
    }

    upstream frontend_backend {
        server 127.0.0.1:5000;
        keepalive 16;
    }

    # ── RATE LIMITING ZONES ────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api_limit:10m    rate=60r/m;
    limit_req_zone  $binary_remote_addr zone=stream_limit:10m rate=300r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── GZIP ───────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        application/x-mpegURL
        application/dash+xml
        application/json
        application/javascript
        text/css
        text/xml;

    # ── LOGGING ────────────────────────────────────────────────
    log_format stream_log '$remote_addr [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          'rt=$request_time ut=$upstream_response_time '
                          'cache=$upstream_cache_status';

    access_log /var/log/nginx/ignite_access.log stream_log buffer=32k flush=5s;
    error_log  /var/log/nginx/ignite_error.log warn;

    # ══════════════════════════════════════════════════════════
    #  HTTP → HTTPS redirect
    # ══════════════════════════════════════════════════════════
    server {
        listen 80;
        listen [::]:80;
        server_name yourdomain.com stream.yourdomain.com;
        return 301 https://$host$request_uri;
    }

    # ══════════════════════════════════════════════════════════
    #  MAIN HTTPS SERVER
    # ══════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name yourdomain.com;

        ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Security headers ──
        add_header X-Frame-Options         "SAMEORIGIN"  always;
        add_header X-Content-Type-Options  "nosniff"     always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection        "1; mode=block" always;

        root /var/www/public;

        # ── SILENT STREAM PROXY (/stream/*) ──────────────────
        # This is the core of the "user never sees the real URL" system.
        # All HLS/DASH requests are piped through our Node.js proxy backend,
        # which fetches segments from external servers and caches them.

        location /stream/ {
            limit_conn   conn_limit   10;
            limit_req    zone=stream_limit burst=50 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Cache HLS segments aggressively (they don't change)
            location ~* /stream/seg/ {
                proxy_pass              http://api_backend;
                proxy_cache             segments;
                proxy_cache_valid       200 5m;
                proxy_cache_valid       206 5m;
                proxy_cache_use_stale   error timeout updating http_500 http_502 http_503;
                proxy_cache_lock        on;
                proxy_cache_lock_timeout 5s;
                add_header X-Cache-Status $upstream_cache_status always;
                add_header Cache-Control "private, max-age=300" always;
                add_header Access-Control-Allow-Origin "*" always;
                proxy_hide_header Set-Cookie;
                proxy_ignore_headers Set-Cookie;
            }

            # Cache playlists briefly (they update for live streams)
            location ~* /stream/hls/.*\.m3u8$ {
                proxy_pass              http://api_backend;
                proxy_cache             playlists;
                proxy_cache_valid       200 10s;
                proxy_cache_use_stale   error timeout;
                add_header X-Cache-Status $upstream_cache_status always;
                add_header Cache-Control "no-store" always;
                add_header Access-Control-Allow-Origin "*" always;
                add_header Content-Type "application/vnd.apple.mpegurl" always;
            }

            # Cache DASH manifests briefly
            location ~* /stream/dash/.*\.mpd$ {
                proxy_pass         http://api_backend;
                proxy_cache        playlists;
                proxy_cache_valid  200 10s;
                add_header Cache-Control "no-store" always;
                add_header Content-Type "application/dash+xml" always;
                add_header Access-Control-Allow-Origin "*" always;
            }

            # General stream pass-through
            proxy_cache        segments;
            proxy_cache_valid  200 2m;
            add_header Access-Control-Allow-Origin "*" always;
        }

        # ── API ROUTES (/api/*) ───────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass          http://api_backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection        "";
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_read_timeout  60s;
            proxy_send_timeout  60s;

            # No caching for API by default
            add_header Cache-Control "no-cache, no-store" always;
        }

        # ── LOCAL HLS SEGMENTS (served directly) ──────────────
        location /streams/ {
            root /var/www;
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Content-Range" always;
            add_header Accept-Ranges bytes;

            location ~* \.m3u8$ {
                add_header Cache-Control "no-cache, no-store" always;
                add_header Content-Type  "application/vnd.apple.mpegurl" always;
                add_header Access-Control-Allow-Origin "*" always;
            }
            location ~* \.ts$ {
                add_header Cache-Control "public, max-age=86400" always;
                add_header Access-Control-Allow-Origin "*" always;
            }
            location ~* \.mpd$ {
                add_header Cache-Control "no-cache" always;
                add_header Content-Type  "application/dash+xml" always;
                add_header Access-Control-Allow-Origin "*" always;
            }
            location ~* \.(m4s|mp4)$ {
                add_header Cache-Control "public, max-age=86400" always;
                add_header Access-Control-Allow-Origin "*" always;
            }
        }

        # ── UPLOADS (posters) ─────────────────────────────────
        location /uploads/ {
            root /var/www/public;
            add_header Cache-Control "public, max-age=604800" always;
            add_header Access-Control-Allow-Origin "*" always;
        }

        # ── FRONTEND (React/Vite) ─────────────────────────────
        location / {
            proxy_pass          http://frontend_backend;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade     $http_upgrade;
            proxy_set_header    Connection  "upgrade";
            proxy_set_header    Host        $host;
            proxy_read_timeout  60s;
        }

        # ── RTMP stats ────────────────────────────────────────
        location /rtmp-stat {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            deny  all;
            rtmp_stat all;
        }
    }

    # ══════════════════════════════════════════════════════════
    #  STREAMING SUBDOMAIN (stream.yourdomain.com)
    #  Serves only HLS/DASH content + stream proxy API
    # ══════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name stream.yourdomain.com;

        ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Authorization" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Serve static HLS/DASH files from /var/www/streams
        root /var/www/streams;
        autoindex off;

        # HLS
        location ~* \.m3u8$ {
            add_header Content-Type  "application/vnd.apple.mpegurl";
            add_header Cache-Control "no-cache, no-store";
            add_header Access-Control-Allow-Origin "*";
        }
        location ~* \.ts$ {
            add_header Content-Type  "video/mp2t";
            add_header Cache-Control "public, max-age=86400";
            add_header Access-Control-Allow-Origin "*";
        }

        # DASH
        location ~* \.mpd$ {
            add_header Content-Type  "application/dash+xml";
            add_header Cache-Control "no-cache";
            add_header Access-Control-Allow-Origin "*";
        }
        location ~* \.(m4s|mp4)$ {
            add_header Content-Type  "video/iso.segment";
            add_header Cache-Control "public, max-age=86400";
            add_header Access-Control-Allow-Origin "*";
        }

        # Preflights
        location ~* \.ts$|\.m3u8$|\.mpd$|\.m4s$ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS, HEAD';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # Proxy API requests to Node backend
        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /stream/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache             segments;
            proxy_cache_valid       200 5m;
            add_header X-Cache-Status $upstream_cache_status always;
        }
    }
}
