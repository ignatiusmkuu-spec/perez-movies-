# ═══════════════════════════════════════════════════════════════
#  Nginx RTMP + HLS Streaming Server Configuration
#  Ignite Movies — Production Setup
#
#  Requirements:
#    sudo apt install nginx libnginx-mod-rtmp
#    or: compile nginx with nginx-rtmp-module
#
#  Place this file at: /etc/nginx/nginx.conf
#  Restart:            sudo nginx -t && sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════════

worker_processes auto;
worker_rlimit_nofile 65536;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

# ── RTMP Server Block ──────────────────────────────────────────
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        max_connections 1000;

        # ── Live streaming app ──
        application live {
            live on;
            record off;

            # Allow publishing only from trusted IPs
            allow publish 127.0.0.1;
            allow publish 10.0.0.0/8;
            deny  publish all;

            # Allow playback from anywhere
            allow play all;

            # HLS output
            hls on;
            hls_path /var/www/streams/hls/live;
            hls_fragment 6s;
            hls_playlist_length 60s;
            hls_nested on;

            # MPEG-DASH output
            dash on;
            dash_path /var/www/streams/dash/live;
            dash_fragment 6s;
            dash_playlist_length 60s;
            dash_nested on;
        }

        # ── VOD (Video on Demand) app ──
        application vod {
            play /var/www/streams/vod;
        }

        # ── HLS VOD relay app ──
        application hls {
            live on;
            hls on;
            hls_path /var/www/streams/hls;
            hls_fragment 6s;
            hls_playlist_length 3600s;
            hls_type vod;
            hls_nested on;

            # Adaptive bitrate: separate stream per quality
            hls_variant _360p  BANDWIDTH=928000,  RESOLUTION=640x360;
            hls_variant _480p  BANDWIDTH=1528000, RESOLUTION=854x480;
            hls_variant _720p  BANDWIDTH=2992000, RESOLUTION=1280x720;
            hls_variant _1080p BANDWIDTH=5320000, RESOLUTION=1920x1080;
        }
    }
}

# ── HTTP Server Block ──────────────────────────────────────────
http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;

    # ── Security headers ──
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Rate limiting zones ──
    limit_req_zone $binary_remote_addr zone=stream_limit:10m rate=30r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Log format ──
    log_format stream_log '$remote_addr [$time_local] "$request" '
                          '$status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'rt=$request_time ut=$upstream_response_time';

    # ── Main streaming server ──
    server {
        listen 80;
        listen [::]:80;
        server_name stream.yourdomain.com;

        # Redirect to HTTPS
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name stream.yourdomain.com;

        ssl_certificate     /etc/letsencrypt/live/stream.yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/stream.yourdomain.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        access_log /var/log/nginx/stream_access.log stream_log;
        error_log  /var/log/nginx/stream_error.log;

        root /var/www/streams;

        # ── HLS segments ──
        location /hls/ {
            # Apply rate limiting
            limit_req zone=stream_limit burst=10 nodelay;
            limit_conn conn_limit 5;

            # CORS for video players
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Content-Range" always;

            # Cache segments (not playlists)
            location ~* \.ts$ {
                add_header Cache-Control "public, max-age=86400";
                add_header Access-Control-Allow-Origin "*";
            }

            # Don't cache playlists (live update)
            location ~* \.m3u8$ {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Access-Control-Allow-Origin "*";
            }

            types {
                application/vnd.apple.mpegurl   m3u8;
                video/mp2t                      ts;
            }
        }

        # ── DASH segments ──
        location /dash/ {
            limit_req zone=stream_limit burst=10 nodelay;
            limit_conn conn_limit 5;

            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

            location ~* \.mpd$ {
                add_header Cache-Control "no-cache, no-store";
                add_header Access-Control-Allow-Origin "*";
                add_header Content-Type "application/dash+xml";
            }

            location ~* \.m4s$ {
                add_header Cache-Control "public, max-age=86400";
                add_header Access-Control-Allow-Origin "*";
            }
        }

        # ── Thumbnails / posters ──
        location /thumbnails/ {
            add_header Cache-Control "public, max-age=604800";
            add_header Access-Control-Allow-Origin "*";
        }

        # ── Backend API reverse proxy ──
        location /api/ {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ── Frontend ──
        location / {
            proxy_pass http://127.0.0.1:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
        }

        # ── RTMP stats page ──
        location /rtmp-stat {
            rtmp_stat all;
            rtmp_stat_stylesheet /stat.xsl;
        }
    }
}
